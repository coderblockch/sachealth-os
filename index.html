<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SacHealth OS - Professional Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-white p-6 font-sans min-h-screen">

    <!-- HEADER -->
    <header class="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-xl border 
border-slate-700 shadow-lg">
        <div class="flex items-center gap-2">
            <i data-lucide="activity" class="text-blue-400"></i>
            <h1 class="text-2xl font-bold">SacHealth <span class="text-blue-400">OS</span></h1>
        </div>
        <div id="status" class="text-xs bg-blue-900 text-blue-200 px-3 py-1 rounded-full font-mono">
            SYSTEM STATUS: OPERATIONAL (PROTOTYPE MODE)
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- AI TRIAGE PANEL -->
        <div class="bg-slate-800 p-6 rounded-2xl border border-blue-500/30 shadow-xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-blue-400">
                <i data-lucide="cpu"></i> AI Triage Engine
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold">Patient Name</label>
                    <input id="p-name" type="text" class="w-full bg-slate-700 border border-slate-600 p-2 
rounded mt-1 outline-none focus:border-blue-400" placeholder="Full Name">
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-xs text-slate-400 uppercase font-bold">Age</label>
                        <input id="p-age" type="number" class="w-full bg-slate-700 border border-slate-600 
p-2 rounded mt-1 outline-none focus:border-blue-400" placeholder="00">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs text-slate-400 uppercase font-bold">O2 Saturation (%)</label>
                        <input id="p-o2" type="number" class="w-full bg-slate-700 border border-slate-600 
p-2 rounded mt-1 outline-none focus:border-blue-400" placeholder="98">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="text-xs text-slate-400 uppercase font-bold">Primary Symptoms</label>
                    <textarea id="p-symp" class="w-full bg-slate-700 border border-slate-600 p-2 rounded 
mt-1 outline-none focus:border-blue-400" rows="3" placeholder="e.g. Chest pain, fever..."></textarea>
                </div>
                <button onclick="runTriage()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 font-bold 
rounded-xl transition-all shadow-lg uppercase tracking-wider">
                    Analyze Patient
                </button>
            </div>

            <!-- AI RESULT BOX -->
            <div id="result-box" class="hidden mt-6 p-4 rounded-xl border transition-all duration-500">
                <p class="text-xs uppercase font-bold opacity-70">AI Recommendation:</p>
                <h3 id="res-rec" class="text-xl font-bold mb-1">---</h3>
                <p id="res-urg" class="text-sm font-medium"></p>
            </div>
        </div>

        <!-- BED STATUS SECTION -->
        <div class="lg:col-span-2">
            <h2 class="text-lg mb-4 text-slate-400 flex items-center gap-2">
                <i data-lucide="bed"></i> Real-Time Bed Status
            </h2>
            <div id="beds-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Beds will be injected here immediately -->
            </div>
        </div>
    </div>

    <script>
        // INTERNAL DATA (No longer depends on server to show the UI)
        const MOCK_BEDS = [
            {"id": "1", "num": "101", "status": "Occupied", "patient": "John Doe"},
            {"id": "2", "num": "102", "status": "Pending_Discharge", "patient": "Jane Smith"},
            {"id": "3", "num": "103", "status": "Available", "patient": null},
            {"id": "4", "num": "104", "status": "Cleaning", "patient": null},
            {"id": "5", "num": "105", "status": "Pending_Discharge", "patient": "Robert Wilson"},
        ];

        function getColor(status) {
            if (status === 'Available') return 'bg-green-500';
            if (status === 'Occupied') return 'bg-red-500';
            if (status === 'Pending_Discharge') return 'bg-yellow-500';
            return 'bg-blue-500';
        }

        function runTriage() {
            const name = document.getElementById('p-name').value || "Patient";
            const age = parseInt(document.getElementById('p-age').value) || 0;
            const o2 = parseInt(document.getElementById('p-o2').value) || 100;
            const symp = document.getElementById('p-symp').value.toLowerCase();
            
            let priority = 3, rec = "General Ward", urg = "Moderate", color = "bg-yellow-500";

            if (o2 < 90 || symp.includes("chest pain")) {
                priority = 1; rec = "ICU (Immediate)"; urg = "CRITICAL"; color = "bg-red-500";
            } else if (age > 70 && symp.includes("cough")) {
                priority = 2; rec = "Respiratory Unit"; urg = "High"; color = "bg-orange-500";
            } else if (symp.includes("fever")) {
                priority = 3; rec = "Urgent Care"; urg = "Moderate"; color = "bg-yellow-500";
            } else {
                priority = 4; rec = "Outpatient Clinic"; urg = "Low"; color = "bg-green-500";
            }

            const box = document.getElementById('result-box');
            box.className = `mt-6 p-4 rounded-xl border ${color} text-slate-900 font-bold shadow-xl`;
            document.getElementById('res-rec').innerHTML = rec;
            document.getElementById('res-urg').innerHTML = `Priority Level: ${priority} (${urg})`;
            box.classList.remove('hidden');
        }

        function renderBeds() {
            const grid = document.getElementById('beds-grid');
            grid.innerHTML = ''; 
            MOCK_BEDS.forEach(bed => {
                grid.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-md">
                        <div class="flex justify-between mb-2">
                            <b class="text-slate-200">Bed ${bed.num}</b>
                            <div class="w-3 h-3 rounded-full ${getColor(bed.status)}"></div>
                        </div>
                        <p class="text-sm text-slate-400">${bed.patient || 'Empty'}</p>
                        <div class="mt-2">
                            <span class="text-[10px] px-2 py-1 rounded font-bold ${getColor(bed.status)} 
text-slate-900 uppercase">${bed.status}</span>
                        </div>
                    </div>`;
            });
        }

        window.onload = () => {
            renderBeds();
            lucide.createIcons();
        };
    </script>
</body>
</html>
