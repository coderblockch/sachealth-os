<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SacHealth OS - Clinical Triage & Bed Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-white p-6 font-sans min-h-screen">
 
    <!-- HEADER -->
    <header class="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
        <div class="flex items-center gap-2">
            <i data-lucide="activity" class="text-blue-400"></i>
            <h1 class="text-2xl font-bold">SacHealth <span class="text-blue-400">OS</span></h1>
        </div>
        <div id="status" class="text-xs bg-slate-700 text-slate-300 px-3 py-1 rounded-full font-mono">
            CONNECTING...
        </div>
    </header>
 
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
 
        <!-- TRIAGE PANEL -->
        <div class="bg-slate-800 p-6 rounded-2xl border border-blue-500/30 shadow-xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-blue-400">
                <i data-lucide="stethoscope"></i> Clinical Triage (CDSS)
            </h2>
 
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 uppercase font-bold">Patient Name</label>
                    <input id="p-name" type="text" class="w-full bg-slate-700 border border-slate-600 p-2 rounded mt-1 outline-none focus:border-blue-400" placeholder="Full Name">
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="text-xs text-slate-400 uppercase font-bold">Age</label>
                        <input id="p-age" type="number" class="w-full bg-slate-700 border border-slate-600 p-2 rounded mt-1 outline-none focus:border-blue-400" placeholder="00">
                    </div>
                    <div class="w-1/2">
                        <label class="text-xs text-slate-400 uppercase font-bold">O2 Saturation (%)</label>
                        <input id="p-o2" type="number" class="w-full bg-slate-700 border border-slate-600 p-2 rounded mt-1 outline-none focus:border-blue-400" placeholder="98">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="text-xs text-slate-400 uppercase font-bold">Primary Symptoms</label>
                    <textarea id="p-symp" class="w-full bg-slate-700 border border-slate-600 p-2 rounded mt-1 outline-none focus:border-blue-400" rows="3" placeholder="e.g. Chest pain, fever..."></textarea>
                </div>
                <button onclick="runTriage()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 font-bold rounded-xl transition-all shadow-lg uppercase tracking-wider">
                    Analyze Patient
                </button>
            </div>
 
            <!-- RESULT BOX -->
            <div id="result-box" class="hidden mt-6 p-4 rounded-xl border transition-all duration-500">
                <p class="text-xs uppercase font-bold opacity-70">CDSS Recommendation:</p>
                <h3 id="res-rec" class="text-xl font-bold mb-1">---</h3>
                <p id="res-urg" class="text-sm font-medium"></p>
            </div>
        </div>
 
        <!-- BED STATUS SECTION -->
        <div class="lg:col-span-2">
            <h2 class="text-lg mb-4 text-slate-400 flex items-center gap-2">
                <i data-lucide="bed"></i> Real-Time Bed Status
            </h2>
            <div id="beds-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Beds injected here from the backend -->
            </div>
        </div>
    </div>
 
    <script>
        // Base URL of the FastAPI backend.
        // For local development it points to localhost.
        // When deployed, replace with your live backend URL (e.g. https://sachealth-api.onrender.com)
        const API_URL = "http://127.0.0.1:8000";
 
        function getColor(status) {
            if (status === 'Available') return 'bg-green-500';
            if (status === 'Occupied') return 'bg-red-500';
            if (status === 'Pending_Discharge') return 'bg-yellow-500';
            return 'bg-blue-500';
        }
 
        function setStatus(text, ok) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = ok
                ? "text-xs bg-green-900 text-green-200 px-3 py-1 rounded-full font-mono"
                : "text-xs bg-red-900 text-red-200 px-3 py-1 rounded-full font-mono";
        }
 
        // --- Fetch beds from the backend (real full-stack call) ---
        async function renderBeds() {
            const grid = document.getElementById('beds-grid');
            grid.innerHTML = '<p class="text-slate-500 col-span-2">Loading beds...</p>';
 
            try {
                const response = await fetch(`${API_URL}/beds`);
                if (!response.ok) throw new Error('Backend error: ' + response.status);
                const beds = await response.json();
 
                grid.innerHTML = '';
                beds.forEach(bed => {
                    grid.innerHTML += `
                        <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-md">
                            <div class="flex justify-between mb-2">
                                <b class="text-slate-200">Bed ${bed.num}</b>
                                <div class="w-3 h-3 rounded-full ${getColor(bed.status)}"></div>
                            </div>
                            <p class="text-sm text-slate-400">${bed.patient || 'Empty'}</p>
                            <div class="mt-2">
                                <span class="text-[10px] px-2 py-1 rounded font-bold ${getColor(bed.status)} text-slate-900 uppercase">${bed.status}</span>
                            </div>
                        </div>`;
                });
                setStatus('SYSTEM ONLINE', true);
            } catch (error) {
                grid.innerHTML = '<p class="text-red-400 col-span-2">⚠️ Could not load beds. Is the backend running?</p>';
                setStatus('BACKEND OFFLINE', false);
                console.error(error);
            }
        }
 
        // --- Send patient to the backend CDSS endpoint ---
        async function runTriage() {
            const name = document.getElementById('p-name').value || "Patient";
            const age = parseInt(document.getElementById('p-age').value) || 0;
            const o2 = parseInt(document.getElementById('p-o2').value) || 100;
            const symp = document.getElementById('p-symp').value;
 
            const box = document.getElementById('result-box');
            const recEl = document.getElementById('res-rec');
            const urgEl = document.getElementById('res-urg');
 
            try {
                const response = await fetch(`${API_URL}/triage/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        patient_name: name,
                        age: age,
                        symptoms: symp,
                        oxygen_level: o2
                    })
                });
                if (!response.ok) throw new Error('Backend error: ' + response.status);
                const data = await response.json();
 
                box.className = `mt-6 p-4 rounded-xl border ${data.color} text-slate-900 font-bold shadow-xl`;
                recEl.innerHTML = data.recommendation;
                urgEl.innerHTML = `Priority Level: ${data.priority} (${data.urgency})`;
                box.classList.remove('hidden');
            } catch (error) {
                box.className = "mt-6 p-4 rounded-xl border bg-red-900 text-red-200 font-bold";
                recEl.innerHTML = "⚠️ Analysis failed";
                urgEl.innerHTML = "Could not reach the backend. Is it running?";
                box.classList.remove('hidden');
                console.error(error);
            }
        }
 
        window.onload = () => {
            renderBeds();
            lucide.createIcons();
        };
    </script>
</body>
</html>
